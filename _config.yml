# Book settings
# Learn more at https://jupyterbook.org/customize/config.html

title: "fenicsx-warp: A Computational Model of Volumetric Mesh Warping"
author: Henrik Finsberg
copyright: "2026"
only_build_toc_files: true

# Force re-execution of notebooks on each build.
# See https://jupyterbook.org/content/execute.html
execute:
  execute_notebooks: force
  timeout: 3000

# Information about where the book exists on the web
repository:
  url: https://github.com/ComputationalPhysiology/fenicsx-warp
  branch: main

html:
  use_issues_button: true
  use_repository_button: true

parse:
  myst_enable_extensions:
    - amsmath
    - dollarmath
    - linkify

sphinx:

  config:
    html_last_updated_fmt: "%b %d, %Y"
    nb_execution_show_tb: True
    suppress_warnings: ["mystnb.unknown_mime_type", "bibtex.duplicate_citation"]
    nb_custom_formats:  # https://jupyterbook.org/en/stable/file-types/jupytext.html#file-types-custom
        .py:
            - jupytext.reads
            - fmt: py

  extra_extensions:
  - 'sphinx.ext.autodoc'
  - 'sphinx.ext.napoleon'
  - 'sphinx.ext.viewcode'

exclude_patterns: [".pytest_cache/*" ,"tests", venv, sandbox, .vcode, .ruff_cache, .github, .git, .venv, third_party]
